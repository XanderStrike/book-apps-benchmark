services:
  app:
    image: ghcr.io/bookorbit/bookorbit:1.4.0
    container_name: bookorbit_loadtest
    restart: unless-stopped
    init: true
    env_file:
      - .env
    ports:
      - "6061:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../books:/books:ro
      - ./data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3000/api/v1/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  postgres:
    image: pgvector/pgvector:pg16
    container_name: bookorbit_db_loadtest
    restart: unless-stopped
    environment:
      POSTGRES_USER: bookorbit
      POSTGRES_PASSWORD: loadtest_password
      POSTGRES_DB: bookorbit
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookorbit -d bookorbit"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
